<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<link rel="stylesheet" href="css/style.css">
		<link rel="stylesheet" href="css/测试.css"/>
	</head>
	<body>
		<!-- 导航栏（所有页面必须完全一样） -->
		<div class="navbar">
		    <div class="nav-left">
		        <div class="logo">📚 云端书库</div>
		        <div class="nav-menu">
		            <ul>
		                <li><a href="index.html">首页</a></li>
		                <li><a href="文学小说.html">书库</a></li>
		                <li><a href="shop.html">购物车</a></li>
						<li><a href="后台.html">管理后台</a></li>
		            </ul>
		        </div>
		        <div class="search-group">
		            <input
		                type="text" 
		                id="searchInput" 
		                class="search-box" 
		                placeholder="输入书名搜索..." 
		                onkeydown="if(event.keyCode==13) doSearch()"
		            >
		            <button onclick="doSearch()" class="search-btn">搜索</button>
		        </div>
		    </div>
		
		    <div class="nav-right">
		        <a href="user.html">个人中心</a>
		    </div>
		</div>
	<div class="main-layout">
		<!-- 侧边栏 (已修改为 index.html 样式) -->
		<div class="sidebar">
		    <ul class="menu">
		        <!-- 修正了点击事件，使其与 JS 函数 switchTab 对应 -->
		        <li onclick="switchTab('books')" id="menu-books" class="active">图书管理</li>
		        <li onclick="switchTab('orders')" id="menu-orders">订单管理</li>
		        <li onclick="switchTab('users')" id="menu-users">用户管理</li>
		    </ul>
		</div>
		
		<!-- 主内容区 -->
		<div class="main-content">
		    <!-- 图书管理视图 -->
		    <div id="view-books">
		        <div class="page-title">图书管理</div>
		        <div class="card">
		            <button class="btn btn-primary" onclick="openAddModal()">+ 添加图书</button>
		            <table>
		                <thead>
		                    <tr>
		                        <th>封面</th>
		                        <th>书名</th>
		                        
		                        <!-- 修改点：在书名和作者中间插入分类 -->
		                        <th>分类</th> 
		                        
		                        <th>作者</th>
		                        <th>价格</th>
		                        <th>库存</th>
		                        <th style="text-align: right;">操作</th>
		                    </tr>
		                </thead>
		                <tbody id="book-table-body">
		                    <!-- JS 渲染内容 -->
		                </tbody>
		            </table>
		        </div>
		    </div>
		
		    <!-- 订单管理视图 (占位) -->
		    <div id="view-orders" class="hidden">
		        <div class="page-title">订单管理</div>
		        <div class="card">
		            <p>这里是订单管理界面内容。</p>
		        </div>
		    </div>
		
		    <!-- 用户管理视图 (占位) -->
		    <div id="view-users" class="hidden">
		        <div class="page-title">用户管理</div>
		        <div class="card">
		            <p>这里是用户管理界面内容。</p>
		        </div>
		    </div>
		</div>
		
		<!-- 添加/编辑图书模态框 -->
		<div class="modal-overlay" id="bookModal">
		    <div class="modal">
		        <div class="modal-header" id="modalTitle">添加图书</div>
		        <form id="bookForm" onsubmit="handleSave(event)">
		            <input type="hidden" id="editIndex">
		            <!-- 封面区域 -->
		            <div class="form-item">
		                <label>图书封面</label>
		                <div class="upload-tabs">
		                    <div class="tab-item active" onclick="switchUploadMode('local')" id="tab-local">本地上传</div>
		                    <div class="tab-item" onclick="switchUploadMode('link')" id="tab-link">网络链接</div>
		                </div>
		                <input type="file" id="coverFile" class="form-control" accept="image/*" onchange="handleFileUpload(this)">
		                <input type="text" id="coverLink" class="form-control hidden" placeholder="请输入图片URL地址...">
		                <div class="preview-container">
		                    <img id="coverPreview" class="preview-img" src="" alt="预览">
		                </div>
		            </div>
		            <!-- 书名 -->
		            <div class="form-item">
		                <label>书名</label>
		                <input type="text" id="bookName" class="form-control" placeholder="请输入书名" required>
		            </div>
		            
		            <!-- 修改点：在书名和作者中间插入分类选择框 -->
		            <div class="form-item">
		                <label>分类</label>
		                <select id="bookCategory" class="form-control" required>
		                    <option value="" disabled selected>请选择分类</option>
		                    <option value="文学小说">文学小说</option>
		                    <option value="科学技术">科学技术</option>
		                    <option value="人文社科">人文社科</option>
		                    <option value="少儿读物">少儿读物</option>
		                    <option value="艺术设计">艺术设计</option>
		                    <option value="生活休闲">生活休闲</option>
		                </select>
		            </div>
		
		            <!-- 作者 -->
		            <div class="form-item">
		                <label>作者</label>
		                <input type="text" id="bookAuthor" class="form-control" placeholder="请输入作者" required>
		            </div>
		            
		            <!-- 价格和库存 -->
		            <div class="form-row">
		                <div class="form-item">
		                    <label>价格</label>
		                    <input type="number" id="bookPrice" class="form-control" placeholder="0.00" step="0.01" required>
		                </div>
		                <div class="form-item">
		                    <label>库存</label>
		                    <input type="number" id="bookStock" class="form-control" placeholder="0" required>
		                </div>
		            </div>
		            <div class="modal-footer">
		                <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
		                <button type="submit" class="btn btn-save">保存</button>
		            </div>
		        </form>
		    </div>
		</div>
	</div>	
		<script>
		    // --- 数据存储 Key ---
		    const STORAGE_KEY = 'bookstore_data_v1';
		    
		    // --- 初始化数据 ---
		    let books = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
		
		    document.addEventListener('DOMContentLoaded', () => {
		        renderTable();
		    });
		
		    function saveToStorage() {
		        localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
		        renderTable();
		    }
		
		    function renderTable() {
		        const tbody = document.getElementById('book-table-body');
		        tbody.innerHTML = '';
		        
		        if (books.length === 0) {
		            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 32px; color: #999;">暂无图书数据，请点击“添加图书”</td></tr>';
		            return;
		        }
		        
		        books.forEach((book, index) => {
		            const tr = document.createElement('tr');
		            const coverSrc = book.cover || 'https://via.placeholder.com/40x50?text=No+Cover';
		            tr.innerHTML = `
		                <td><img src="${coverSrc}" class="book-cover-img" alt="封面"></td>
		                <td>${book.name}</td>
		                
		                <!-- 修改点：在书名和作者中间显示分类 -->
		                <td>${book.category || '未分类'}</td> 
		                
		                <td>${book.author}</td>
		                <td>¥${parseFloat(book.price).toFixed(2)}</td>
		                <td>${book.stock}</td>
		                <td style="text-align: right;">
		                    <button class="btn btn-edit btn-action" onclick="openEditModal(${index})">编辑</button>
		                    <button class="btn btn-delete btn-action" onclick="deleteBook(${index})">删除</button>
		                </td>
		            `;
		            tbody.appendChild(tr);
		        });
		    }
		
		    // --- 模态框操作 ---
		    const modal = document.getElementById('bookModal');
		    
		    function openAddModal() {
		        document.getElementById('modalTitle').innerText = '添加图书';
		        document.getElementById('bookForm').reset();
		        document.getElementById('editIndex').value = '';
		        document.getElementById('coverPreview').style.display = 'none';
		        document.getElementById('coverPreview').src = '';
		        switchUploadMode('local');
		        modal.style.display = 'flex';
		    }
		
		    function openEditModal(index) {
		        const book = books[index];
		        document.getElementById('modalTitle').innerText = '编辑图书';
		        document.getElementById('editIndex').value = index;
		        document.getElementById('bookName').value = book.name;
		        document.getElementById('bookAuthor').value = book.author;
		        document.getElementById('bookPrice').value = book.price;
		        document.getElementById('bookStock').value = book.stock;
		        
		        // --- 修改：设置分类选中值 ---
		        document.getElementById('bookCategory').value = book.category || '';
		        
		        if (book.cover && book.cover.startsWith('http') && !book.cover.includes('base64')) {
		            switchUploadMode('link');
		            document.getElementById('coverLink').value = book.cover;
		            document.getElementById('coverPreview').src = book.cover;
		        } else {
		            switchUploadMode('local');
		            if (book.cover) {
		                document.getElementById('coverPreview').src = book.cover;
		                document.getElementById('coverPreview').style.display = 'block';
		            } else {
		                document.getElementById('coverPreview').style.display = 'none';
		            }
		        }
		        modal.style.display = 'flex';
		    }
		
		    function closeModal() {
		        modal.style.display = 'none';
		    }
		
		    // --- 上传模式切换 ---
		    let currentUploadMode = 'local';
		    function switchUploadMode(mode) {
		        currentUploadMode = mode;
		        const fileInput = document.getElementById('coverFile');
		        const linkInput = document.getElementById('coverLink');
		        const tabLocal = document.getElementById('tab-local');
		        const tabLink = document.getElementById('tab-link');
		        if (mode === 'local') {
		            fileInput.classList.remove('hidden');
		            linkInput.classList.add('hidden');
		            tabLocal.classList.add('active');
		            tabLink.classList.remove('active');
		        } else {
		            fileInput.classList.add('hidden');
		            linkInput.classList.remove('hidden');
		            tabLocal.classList.remove('active');
		            tabLink.classList.add('active');
		            document.getElementById('coverPreview').style.display = 'none';
		            document.getElementById('coverPreview').src = '';
		        }
		    }
		
		    function handleFileUpload(input) {
		        if (input.files && input.files[0]) {
		            const reader = new FileReader();
		            reader.onload = function(e) {
		                const preview = document.getElementById('coverPreview');
		                preview.src = e.target.result;
		                preview.style.display = 'block';
		            }
		            reader.readAsDataURL(input.files[0]);
		        }
		    }
		
		    // --- 保存数据 ---
		    function handleSave(e) {
		        e.preventDefault();
		        const index = document.getElementById('editIndex').value;
		        const name = document.getElementById('bookName').value;
		        const author = document.getElementById('bookAuthor').value;
		        
		        // --- 修改：获取分类值 ---
		        const category = document.getElementById('bookCategory').value; 
		        
		        const price = document.getElementById('bookPrice').value;
		        const stock = document.getElementById('bookStock').value;
		        let cover = '';
		
		        if (currentUploadMode === 'link') {
		            cover = document.getElementById('coverLink').value;
		            if (!cover) cover = index !== '' ? books[index].cover : '';
		        } else {
		            const previewSrc = document.getElementById('coverPreview').src;
		            if (previewSrc && previewSrc.includes('base64')) {
		                cover = previewSrc;
		            } else if (index !== '') {
		                cover = books[index].cover;
		            }
		        }
		
		        const bookData = {
		            name: name,
		            author: author,
		            
		            // --- 修改：保存分类数据 ---
		            category: category, 
		            
		            price: price,
		            stock: stock,
		            cover: cover
		        };
		
		        if (index === '') {
		            books.unshift(bookData);
		        } else {
		            books[index] = bookData;
		        }
		        saveToStorage();
		        closeModal();
		    }
		
		    function deleteBook(index) {
		        if (confirm('确定要删除这本书吗？')) {
		            books.splice(index, 1);
		            saveToStorage();
		        }
		    }
		
		    // --- Tab 切换逻辑 ---
		    function switchTab(tabName) {
		        document.getElementById('view-books').classList.add('hidden');
		        document.getElementById('view-orders').classList.add('hidden');
		        document.getElementById('view-users').classList.add('hidden');
		        document.getElementById('menu-books').classList.remove('active');
		        document.getElementById('menu-orders').classList.remove('active');
		        document.getElementById('menu-users').classList.remove('active');
		        document.getElementById('view-' + tabName).classList.remove('hidden');
		        document.getElementById('menu-' + tabName).classList.add('active');
		    }
		
		    window.onclick = function(event) {
		        if (event.target == modal) {
		            closeModal();
		        }
		    }
		</script>
	</body>
</html>
