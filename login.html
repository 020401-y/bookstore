<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 云端书库</title>
    <link rel="stylesheet" href="css/fuben.css">
</head>
<body class="login-body">
    <div class="container">
        <div class="tabs">
            <div class="tab active" data-tab="login">用户登录</div>
            <div class="tab" data-tab="register">用户注册</div>
        </div>
        <div id="login-form" class="form-container">
            <h2 class="form-title">欢迎回来</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="login-username">用户名/邮箱</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" required>
                    <div class="error" id="loginError"></div>
                </div>
                <div class="input-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn" id="loginBtn">立即登录</button>
            </form>
            <a href="index-0.html" class="back-link">返回首页</a>
        </div>
        <div id="register-form" class="form-container" style="display: none;">
            <h2 class="form-title">创建账户</h2>
            <form id="registerForm">
                <div class="input-group">
                    <label for="register-username">设置用户名</label>
                    <input type="text" id="register-username" placeholder="3-16位字母数字汉字" required>
                    <div class="error" id="usernameError"></div>
                </div>
                <div class="input-group">
                    <label for="register-password">设置密码</label>
                    <input type="password" id="register-password" placeholder="仅允许数字" required>
                    <div class="error" id="passwordError"></div>
                </div>
                <div class="input-group">
                    <label for="confirm-password">确认密码</label>
                    <input type="password" id="confirm-password" placeholder="请再次输入密码" required>
                    <div class="error" id="confirmError"></div>
                </div>
                <button type="submit" class="btn">立即注册</button>
            </form>
            <a href="index - 副本.html" class="back-link">返回首页</a>
        </div>
    </div>

    <script>
        // 用户数据库存储 Key
        const USER_DB_KEY = 'bookstore_users';

        // 获取用户数据库（从 localStorage）
        function getUserDatabase() {
            const data = localStorage.getItem(USER_DB_KEY);
            if (data) {
                return JSON.parse(data);
            }
            // 默认有一个管理员账号
            return {
                'admin': '123456'
            };
        }

        // 保存用户数据库（到 localStorage）
        function saveUserDatabase(db) {
            localStorage.setItem(USER_DB_KEY, JSON.stringify(db));
        }

        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab');

            // Tab 切换逻辑
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.getAttribute('data-tab');
                    
                    // 切换 Tab 样式
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    // 切换表单显示
                    document.getElementById('login-form').style.display = target === 'login' ? 'block' : 'none';
                    document.getElementById('register-form').style.display = target === 'register' ? 'block' : 'none';
                });
            });

            // 1. 注册逻辑
            if (registerForm) {
                registerForm.onsubmit = function(e) {
                    e.preventDefault();
                    const username = document.getElementById('register-username').value.trim();
                    const password = document.getElementById('register-password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;

                    clearErrors();
                    let isValid = true;

                    // 用户名正则：汉字、字母、数字
                    const usernameRegex = /^[\u4e00-\u9fa5a-zA-Z0-9]+$/; 
                    if (!usernameRegex.test(username)) {
                        showError('usernameError', '用户名只能包含汉字、字母和数字，不能有特殊符号');
                        isValid = false;
                    }

                    // 密码正则：纯数字
                    const passwordRegex = /^\d+$/; 
                    if (!passwordRegex.test(password)) {
                        showError('passwordError', '密码只能是纯数字');
                        isValid = false;
                    }

                    if (password !== confirmPassword) {
                        showError('confirmError', '两次输入的密码不一致');
                        isValid = false;
                    }

                    if (!isValid) return;

                    let userDatabase = getUserDatabase();
                    
                    if (userDatabase[username]) {
                        showError('usernameError', '该用户名已被注册');
                        return;
                    }

                    userDatabase[username] = password;
                    saveUserDatabase(userDatabase);
                    alert('注册成功！请登录');
                    
                    // 注册成功后自动切换到登录 Tab
                    document.querySelector('.tab[data-tab="login"]').click();
                };
            }

            // 2. 登录逻辑
            loginForm.onsubmit = function(e) {
                e.preventDefault();
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value;
            
                let userDatabase = getUserDatabase();

                // 1. 如果是超级管理员
                if (username === 'admin' && userDatabase['admin'] === password) {
                    localStorage.setItem('currentUser', username);
                    localStorage.setItem('userRole', 'admin'); // 贴上管理员标签
                    window.location.href = 'index.html';
                } 
                // 2. 如果是普通注册用户
                else if (userDatabase[username] && userDatabase[username] === password) {
                    localStorage.setItem('currentUser', username);
                    localStorage.setItem('userRole', 'user'); // 贴上普通用户标签
                    window.location.href = 'index.html';
                } 
                else {
                    alert('用户名或密码错误');
                }
            };

            function showError(elementId, message) {
                const element = document.getElementById(elementId);
                if (element) {
                    element.textContent = message;
                    element.style.display = 'block';
                }
            }

            function clearErrors() {
                const errors = document.querySelectorAll('.error');
                errors.forEach(el => {
                    el.style.display = 'none';
                    el.textContent = '';
                });
            }
        });
    </script>
</body>
</html>
